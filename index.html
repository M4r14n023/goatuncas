        function PartidoCard({ partido, fechaIndex, fecha, actualizarJugadores, contarPartidosJugador, esBonus }) {
            const [jugadoresSeleccionados, setJugadoresSeleccionados] = useState(partido.jugadores || []);
            
            useEffect(() => {
                setJugadoresSeleccionados(partido.jugadores || []);
            }, [partido.jugadores]);

            // Obtener jugadores habilitados para este partido
            const jugadoresHabilitados = fecha.jugadoresHabilitados || [];
            
            const jugadoresDisponibles = partido.categorias.flatMap(cat => {
                const jugadoresBase = JUGADORES_GOAT[cat] || [];
                
                // Agregar jugadores habilitados de categorías inferiores
                const jugadoresExtra = jugadoresHabilitados
                    .filter(jh => jh.categoriaDestino === cat)
                    .map(jh => {
                        // Encontrar el jugador original
                        const jugadorOriginal = Object.values(JUGADORES_GOAT)
                            .flat()
                            .find(j => j.nombre === jh.jugador);
                        
                        return {
                            ...jugadorOriginal,
                            esHabilitado: true,
                            categoriaOriginal: jugadorOriginal.categoria
                        };
                    });
                
                return [...jugadoresBase, ...jugadoresExtra];
            });

            const agregarJugador = (nombreJugador) => {
                if (jugadoresSeleccionados.length >= partido.numJugadores) {
                    alert(`Este partido solo permite ${partido.numJugadores} jugador(es)`);
                    return;
                }

                // Verificar si el jugador está habilitado en categoría superior
                const jugadorInfo = jugadoresDisponibles.find(j => j.nombre === nombreJugador);
                const estaHabilitado = jugadorInfo && jugadorInfo.esHabilitado;
                
                // Solo contar partidos si NO está jugando en categoría superior
                if (!estaHabilitado) {
                    const countPartidos = contarPartidosJugador(fechaIndex, nombreJugador);
                    if (countPartidos >= 3) {
                        alert(`${nombreJugador} ya está convocado para 3 partidos. No puede jugar más.`);
                        return;
                    }
                }

                const nuevosJugadores = [...jugadoresSeleccionados, nombreJugador];
                setJugadoresSeleccionados(nuevosJugadores);
                actualizarJugadores(fechaIndex, partido.id, nuevosJugadores);
            };

            const eliminarJugador = (index) => {
                const nuevosJugadores = jugadoresSeleccionados.filter((_, i) => i !== index);
                setJugadoresSeleccionados(nuevosJugadores);
                actualizarJugadores(fechaIndex, partido.id, nuevosJugadores);
            };

            return (
                <div className={`match-card ${esBonus ? 'bonus' : ''}`}>
                    <div className="match-header">
                        <div>
                            <div className="match-type">
                                {partido.tipo}
                            </div>
                            {esBonus && <div style={{color: '#f59e0b', fontSize: '14px', fontWeight: '600'}}>⭐ PARTIDO BONUS (20 pts)</div>}
                        </div>
                        <div className="match-time">
                            {partido.dia === 'sabado' ? 'Sáb' : 'Dom'} {partido.horario} - P{partido.posicion}
                        </div>
                    </div>

                    <div style={{marginBottom: '10px'}}>
                        <strong>Jugadores asignados:</strong>
                        {jugadoresSeleccionados.length === 0 && <span style={{color: '#999'}}> Ninguno</span>}
                        <div style={{marginTop: '8px'}}>
                            {jugadoresSeleccionados.map((jugador, idx) => {
                                const jugadorObj = jugadoresDisponibles.find(j => j.nombre === jugador);
                                const esHabilitado = jugadorObj && jugadorObj.esHabilitado;
                                return (
                                    <div key={idx} style={{
                                        display: 'inline-block',
                                        background: esHabilitado ? '#10b981' : '#667eea',
                                        color: 'white',
                                        padding: '5px 12px',
                                        borderRadius: '6px',
                                        marginRight: '8px',
                                        marginBottom: '8px'
                                    }}>
                                        {jugador}
                                        {jugadorObj?.capitan && <span className="captain-badge">CAPITÁN</span>}
                                        {esHabilitado && <span style={{
                                            background: 'rgba(255,255,255,0.3)',
                                            padding: '2px 6px',
                                            borderRadius: '4px',
                                            fontSize: '10px',
                                            marginLeft: '6px'
                                        }}>↑</span>}
                                        <button 
                                            onClick={() => eliminarJugador(idx)}
                                            style={{
                                                marginLeft: '8px',
                                                background: 'rgba(255,255,255,0.3)',
                                                border: 'none',
                                                color: 'white',
                                                borderRadius: '4px',
                                                cursor: 'pointer',
                                                padding: '2px 6px'
                                            }}
                                        >
                                            ✕
                                        </button>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {jugadoresSeleccionados.length < partido.numJugadores && (
                        <div className="form-group" style={{marginBottom: '0'}}>
                            <label>Agregar jugador:</label>
                            <select 
                                onChange={(e) => {
                                    if (e.target.value) {
                                        agregarJugador(e.target.value);
                                        e.target.value = '';
                                    }
                                }}
                                defaultValue=""
                            >
                                <option value="">Seleccionar...</option>
                                {jugadoresDisponibles
                                    .filter(j => !jugadoresSeleccionados.includes(j.nombre))
                                    .map((j, idx) => {
                                        const count = contarPartidosJugador(fechaIndex, j.nombre);
                                        const esHabilitado = j.esHabilitado;
                                        return (
                                            <option key={idx} value={j.nombre}>
                                                {j.nombre} {j.capitan ? '(CAPITÁN)' : ''} {esHabilitado ? '↑ ' : `- ${count}/3 partidos`}
                                            </option>
                                        );
                                    })}
                            </select>
                        </div>
                    )}

                    {jugadoresSeleccionados.some(j => {
                        const jugadorObj = jugadoresDisponibles.find(jd => jd.nombre === j);
                        const esHabilitado = jugadorObj && jugadorObj.esHabilitado;
                        if (esHabilitado) return false; // No mostrar advertencia para habilitados
                        
                        const count = contarPartidosJugador(fechaIndex, j);
                        return count > 3;
                    }) && (
                        <div className="player-count-warning">
                            ⚠️ Advertencia: Algún jugador supera el límite de 3 partidos
                        </div>
                    )}
                </div>
            );
        }

        function ResultadosTab({ fechas, resultados, toggleResultado }) {
            const [showPlayOffModal, setShowPlayOffModal] = useState(false);

            if (fechas.length === 0) {
                return (
                    <div className="warning">
                        No hay fechas configuradas todavía.
                    </div>
                );
            }

            // Función para calcular el resultado de una fecha
            const calcularResultadoFecha = (fechaIdx) => {
                const fecha = fechas[fechaIdx];
                let ganados = 0;
                let perdidos = 0;
                let puntosGanados = 0;
                let puntosPerdidos = 0;

                fecha.partidos.forEach(partido => {
                    if (partido.jugadores.length > 0) {
                        const key = `${fechaIdx}-${partido.id}`;
                        const ganado = resultados[key] || false;
                        const esBonus = fecha.partidoBonus === partido.id;
                        const puntos = esBonus ? 20 : 10;

                        if (ganado) {
                            ganados++;
                            puntosGanados += puntos;
                        } else {
                            perdidos++;
                            puntosPerdidos += puntos;
                        }
                    }
                });

                return { ganados, perdidos, puntosGanados, puntosPerdidos };
            };

            return (
                <div>
                    <h2 style={{marginBottom: '20px', color: '#1e3c72'}}>Resultados de Partidos</h2>
                    
                    <button 
                        className="btn btn-primary"
                        onClick={() => setShowPlayOffModal(true)}
                        style={{marginBottom: '20px'}}
                    >
                        🏆 Ver Play-Off Proyectado
                    </button>

                    {showPlayOffModal && (
                        <PlayOffModal 
                            fechas={fechas}
                            resultados={resultados}
                            onClose={() => setShowPlayOffModal(false)}
                        />
                    )}
                    
                    {fechas.map((fecha, fechaIdx) => {
                        const resultado = calcularResultadoFecha(fechaIdx);
                        const total = resultado.ganados + resultado.perdidos;
                        const puntosTotal = resultado.puntosGanados + resultado.puntosPerdidos;

                        return (
                            <div key={fechaIdx} className="date-section">
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '15px'}}>
                                    <div className="date-header" style={{marginBottom: 0}}>
                                        Fecha {fecha.numero} - vs {fecha.rival}
                                    </div>
                                    {total > 0 && (
                                        <div style={{
                                            background: resultado.puntosGanados > resultado.puntosPerdidos ? '#d1fae5' : 
                                                       resultado.puntosGanados < resultado.puntosPerdidos ? '#fee2e2' : '#fef3c7',
                                            padding: '10px 20px',
                                            borderRadius: '8px',
                                            border: `2px solid ${resultado.puntosGanados > resultado.puntosPerdidos ? '#10b981' : 
                                                                  resultado.puntosGanados < resultado.puntosPerdidos ? '#ef4444' : '#f59e0b'}`,
                                            fontWeight: '700',
                                            fontSize: '16px',
                                            textAlign: 'center'
                                        }}>
                                            <div style={{color: '#1e3c72', marginBottom: '5px'}}>
                                                Partidos: {resultado.ganados} - {resultado.perdidos}
                                            </div>
                                            <div style={{color: '#1e3c72', fontSize: '18px'}}>
                                                Puntos: {resultado.puntosGanados} - {resultado.puntosPerdidos}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                
                                {fecha.partidos
                                    .filter(partido => partido.jugadores.length > 0)
                                    .sort((a, b) => {
                                        if (a.dia !== b.dia) return a.dia === 'sabado' ? -1 : 1;
                                        if (a.horario !== b.horario) return a.horario.localeCompare(b.horario);
                                        return (a.posicion || 0) - (b.posicion || 0);
                                    })
                                    .map(partido => {
                                    const key = `${fechaIdx}-${partido.id}`;
                                    const ganado = resultados[key] || false;
                                    const esBonus = fecha.partidoBonus === partido.id;
                                    
                                    return (
                                        <div key={partido.id} style={{
                                            background: ganado ? '#d1fae5' : '#fee2e2',
                                            padding: '15px',
                                            borderRadius: '8px',
                                            marginBottom: '10px',
                                            border: esBonus ? '2px solid #f59e0b' : '2px solid transparent'
                                        }}>
                                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                                <div>
                                                    <div style={{fontSize: '12px', color: '#666', marginBottom: '4px'}}>
                                                        {partido.dia === 'sabado' ? 'Sábado' : 'Domingo'} {partido.horario} - Partido {partido.posicion}
                                                    </div>
                                                    <strong>{partido.tipo}</strong>
                                                    {esBonus && <span style={{color: '#f59e0b', marginLeft: '10px'}}>⭐ BONUS (20 pts)</span>}
                                                    {!esBonus && <span style={{color: '#666', marginLeft: '10px', fontSize: '14px'}}>(10 pts)</span>}
                                                    <div style={{fontSize: '14px', marginTop: '5px'}}>
                                                        {partido.jugadores.join(' / ')}
                                                    </div>
                                                </div>
                                                <div className="checkbox-container">
                                                    <input 
                                                        type="checkbox"
                                                        checked={ganado}
                                                        onChange={() => toggleResultado(fechaIdx, partido.id)}
                                                    />
                                                    <label style={{margin: 0}}>
                                                        {ganado ? 'GANADO ✓' : 'PERDIDO'}
                                                    </label>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        );
                    })}
                </div>
            );
        }

        function PlayOffModal({ fechas, resultados, onClose }) {
            // Calcular tabla general proyectada
            const calcularTablaProyectada = () => {
                const tabla = {};
                
                // Inicializar con todos los equipos disponibles
                const todosEquipos = ['GOAT', ...fechas.map(f => f.rival)];
                todosEquipos.forEach(equipo => {
                    tabla[equipo] = {
                        puntosTotales: 0,
                        diferencia: 0,
                        puntosFavor: 0,
                        puntosContra: 0
                    };
                });

                // Calcular resultados de las 4 fechas
                fechas.forEach((fecha, fechaIdx) => {
                    const rival = fecha.rival;
                    let puntosGOAT = 0;
                    let puntosRival = 0;

                    fecha.partidos.forEach(partido => {
                        if (partido.jugadores.length > 0) {
                            const key = `${fechaIdx}-${partido.id}`;
                            const ganado = resultados[key] || false;
                            const esBonus = fecha.partidoBonus === partido.id;
                            const puntos = esBonus ? 20 : 10;

                            if (ganado) {
                                puntosGOAT += puntos;
                            } else {
                                puntosRival += puntos;
                            }
                        }
                    });

                    if (tabla['GOAT']) {
                        tabla['GOAT'].puntosFavor += puntosGOAT;
                        tabla['GOAT'].puntosContra += puntosRival;
                        tabla['GOAT'].puntosTotales += puntosGOAT;
                        tabla['GOAT'].diferencia = tabla['GOAT'].puntosFavor - tabla['GOAT'].puntosContra;
                    }

                    if (tabla[rival]) {
                        tabla[rival].puntosFavor += puntosRival;
                        tabla[rival].puntosContra += puntosGOAT;
                        tabla[rival].puntosTotales += puntosRival;
                        tabla[rival].diferencia = tabla[rival].puntosFavor - tabla[rival].puntosContra;
                    }
                });

                return Object.entries(tabla)
                    .sort((a, b) => {
                        if (b[1].puntosTotales !== a[1].puntosTotales) return b[1].puntosTotales - a[1].puntosTotales;
                        return b[1].diferencia - a[1].diferencia;
                    })
                    .map(([equipo], idx) => ({ equipo, posicion: idx + 1 }));
            };

            const tablaProyectada = calcularTablaProyectada();

            // Generar cruces de octavos: 1vs10, 2vs9, 3vs8, 4vs7, 5vs6
            const crucesOctavos = [
                { equipo1: tablaProyectada[0]?.equipo, pos1: 1, equipo2: tablaProyectada[9]?.equipo, pos2: 10 },
                { equipo1: tablaProyectada[1]?.equipo, pos1: 2, equipo2: tablaProyectada[8]?.equipo, pos2: 9 },
                { equipo1: tablaProyectada[2]?.equipo, pos1: 3, equipo2: tablaProyectada[7]?.equipo, pos2: 8 },
                { equipo1: tablaProyectada[3]?.equipo, pos1: 4, equipo2: tablaProyectada[6]?.equipo, pos2: 7 },
                { equipo1: tablaProyectada[4]?.equipo, pos1: 5, equipo2: tablaProyectada[5]?.equipo, pos2: 6 }
            ];

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{maxWidth: '700px'}}>
                        <div className="modal-header">
                            🏆 Play-Off Proyectado - Octavos de Final
                        </div>

                        <p style={{marginBottom: '20px', color: '#666', fontSize: '14px'}}>
                            Basado en los resultados actuales. La tabla puede cambiar a medida que se completen más resultados.
                        </p>

                        <div style={{marginBottom: '30px'}}>
                            <h4 style={{marginBottom: '15px', color: '#1e3c72'}}>Tabla General Proyectada</h4>
                            <table className="stats-table">
                                <thead>
                                    <tr>
                                        <th>Pos</th>
                                        <th>Equipo</th>
                                        <th>Pts</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {tablaProyectada.slice(0, 10).map((item, idx) => (
                                        <tr key={idx}>
                                            <td><strong>{item.posicion}</strong></td>
                                            <td><strong>{item.equipo}</strong></td>
                                            <td>{tabla Proyectada[idx] ? Object.values(tabla)[idx]?.puntosTotales : 0}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        <div>
                            <h4 style={{marginBottom: '15px', color: '#1e3c72'}}>Cruces de Octavos</h4>
                            {crucesOctavos.map((cruce, idx) => (
                                <div key={idx} style={{
                                    background: '#f8f9fa',
                                    padding: '15px',
                                    borderRadius: '8px',
                                    marginBottom: '10px',
                                    border: '2px solid #d4af37',
                                    display: 'flex',
                                    justifyContent: 'space-between',
                                    alignItems: 'center'
                                }}>
                                    <div style={{flex: 1, textAlign: 'right', paddingRight: '15px'}}>
                                        <span style={{fontSize: '12px', color: '#666'}}>#{cruce.pos1}</span>
                                        {' '}
                                        <strong>{cruce.equipo1 || 'TBD'}</strong>
                                    </div>
                                    <div style={{
                                        background: '#d4af37',
                                        color: '#1a1a1a',
                                        padding: '5px 15px',
                                        borderRadius: '6px',
                                        fontWeight: '700'
                                    }}>
                                        VS
                                    </div>
                                    <div style={{flex: 1, textAlign: 'left', paddingLeft: '15px'}}>
                                        <strong>{cruce.equipo2 || 'TBD'}</strong>
                                        {' '}
                                        <span style={{fontSize: '12px', color: '#666'}}>#{cruce.pos2}</span>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div style={{marginTop: '20px'}}>
                            <button className="btn btn-danger" onClick={onClose}>
                                Cerrar
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function EstadisticasTab({ calcularEstadisticas }) {
            const stats = calcularEstadisticas();

            // Función para obtener el orden de categoría de un jugador
            const getCategoriaOrden = (nombreJugador) => {
                const jugador = Object.values(JUGADORES_GOAT).flat().find(j => j.nombre === nombreJugador);
                if (!jugador) return 999;
                
                const ordenCategorias = {
                    'damas_a': 1,
                    'damas_b': 2,
                    'damas_c': 3,
                    'caballeros_2da': 4,
                    'caballeros_3ra': 5,
                    'caballeros_4ta': 6,
                    'caballeros_5ta': 7
                };
                
                return ordenCategorias[jugador.categoria] || 999;
            };

            // Función para obtener el nombre de categoría formateado
            const getCategoriaNombre = (nombreJugador) => {
                const jugador = Object.values(JUGADORES_GOAT).flat().find(j => j.nombre === nombreJugador);
                if (!jugador) return '';
                
                const nombres = {
                    'damas_a': 'Damas A',
                    'damas_b': 'Damas B',
                    'damas_c': 'Damas C',
                    'caballeros_2da': 'Caballeros 2da',
                    'caballeros_3ra': 'Caballeros 3ra',
                    'caballeros_4ta': 'Caballeros 4ta',
                    'caballeros_5ta': 'Caballeros 5ta'
                };
                
                return nombres[jugador.categoria] || '';
            };

            // Ordenar jugadores por categoría y luego alfabéticamente
            const jugadoresOrdenados = Object.entries(stats.jugadores).sort((a, b) => {
                const ordenA = getCategoriaOrden(a[0]);
                const ordenB = getCategoriaOrden(b[0]);
                
                if (ordenA !== ordenB) {
                    return ordenA - ordenB;
                }
                
                return a[0].localeCompare(b[0]);
            });

            // Agrupar jugadores por categoría
            const jugadoresPorCategoria = {};
            jugadoresOrdenados.forEach(([nombre, data]) => {
                const categoria = getCategoriaNombre(nombre);
                if (!jugadoresPorCategoria[categoria]) {
                    jugadoresPorCategoria[categoria] = [];
                }
                jugadoresPorCategoria[categoria].push([nombre, data]);
            });

            // Función para obtener el orden de un tipo de partido (para parejas)
            const getOrdenPartido = (pareja) => {
                const jugadores = pareja.split(' - ');
                const categorias = jugadores.map(j => {
                    const jugador = Object.values(JUGADORES_GOAT).flat().find(jg => jg.nombre === j);
                    return jugador ? jugador.categoria : '';
                });
                
                // Determinar el tipo de partido
                const cat1 = categorias[0];
                const cat2 = categorias[1];
                
                // Damas puras
                if (cat1.startsWith('damas') && cat2.startsWith('damas')) {
                    if (cat1 === 'damas_a' && cat2 === 'damas_a') return 1;
                    if ((cat1 === 'damas_a' && cat2 === 'damas_b') || (cat1 === 'damas_b' && cat2 === 'damas_a')) return 2;
                    if (cat1 === 'damas_b' && cat2 === 'damas_b') return 3;
                    if ((cat1 === 'damas_b' && cat2 === 'damas_c') || (cat1 === 'damas_c' && cat2 === 'damas_b')) return 4;
                    if (cat1 === 'damas_c' && cat2 === 'damas_c') return 5;
                }
                
                // Mixtos
                if ((cat1.startsWith('damas') && cat2.startsWith('caballeros')) || 
                    (cat1.startsWith('caballeros') && cat2.startsWith('damas'))) {
                    // Ordenar por dama primero
                    const dama = cat1.startsWith('damas') ? cat1 : cat2;
                    const caballero = cat1.startsWith('caballeros') ? cat1 : cat2;
                    
                    if (dama === 'damas_a' && caballero === 'caballeros_2da') return 10; // Mixto D
                    if (dama === 'damas_a' && caballero === 'caballeros_3ra') return 11; // Mixto A
                    if (dama === 'damas_b' && caballero === 'caballeros_4ta') return 12; // Mixto B
                    if (dama === 'damas_b' && caballero === 'caballeros_5ta') return 13; // Mixto E
                    if (dama === 'damas_c' && caballero === 'caballeros_5ta') return 14; // Mixto C
                }
                
                // Caballeros puros
                if (cat1.startsWith('caballeros') && cat2.startsWith('caballeros')) {
                    if (cat1 === 'caballeros_2da' && cat2 === 'caballeros_2da') return 20;
                    if (cat1 === 'caballeros_3ra' && cat2 === 'caballeros_3ra') return 21;
                    if (cat1 === 'caballeros_4ta' && cat2 === 'caballeros_4ta') return 22;
                    if (cat1 === 'caballeros_5ta' && cat2 === 'caballeros_5ta') return 23;
                    
                    // Combinaciones
                    if ((cat1 === 'caballeros_2da' && cat2 === 'caballeros_3ra') || 
                        (cat1 === 'caballeros_3ra' && cat2 === 'caballeros_2da')) return 30;
                    if ((cat1 === 'caballeros_3ra' && cat2 === 'caballeros_4ta') || 
                        (cat1 === 'caballeros_4ta' && cat2 === 'caballeros_3ra')) return 31;
                    if ((cat1 === 'caballeros_4ta' && cat2 === 'caballeros_5ta') || 
                        (cat1 === 'caballeros_5ta' && cat2 === 'caballeros_4ta')) return 32;
                }
                
                return 999;
            };

            // Ordenar parejas según el orden de los partidos
            const parejasOrdenadas = Object.entries(stats.parejas).sort((a, b) => {
                const ordenA = getOrdenPartido(a[0]);
                const ordenB = getOrdenPartido(b[0]);
                return ordenA - ordenB;
            });

            return (
                <div>
                    <h2 style={{marginBottom: '20px', color: '#1e3c72'}}>Estadísticas del Equipo</h2>
                    
                    <div className="stats-section">
                        <h3>Estadísticas Individuales</h3>
                        <table className="stats-table">
                            <thead>
                                <tr>
                                    <th>Categoría</th>
                                    <th>Jugador</th>
                                    <th>Singles G/P</th>
                                    <th>Dobles G/P</th>
                                    <th>Total G/P</th>
                                    <th>% Victorias</th>
                                </tr>
                            </thead>
                            <tbody>
                                {Object.entries(jugadoresPorCategoria).map(([categoria, jugadores]) => (
                                    jugadores.map(([nombre, data], idx) => {
                                        const total = data.total.ganados + data.total.perdidos;
                                        const porcentaje = total > 0 ? ((data.total.ganados / total) * 100).toFixed(1) : 0;
                                        
                                        return (
                                            <tr key={nombre}>
                                                {idx === 0 && (
                                                    <td rowSpan={jugadores.length} style={{
                                                        fontWeight: '700',
                                                        background: '#f0f9ff',
                                                        verticalAlign: 'middle'
                                                    }}>
                                                        {categoria}
                                                    </td>
                                                )}
                                                <td><strong>{nombre}</strong></td>
                                                <td>{data.singles.ganados} / {data.singles.perdidos}</td>
                                                <td>{data.dobles.ganados} / {data.dobles.perdidos}</td>
                                                <td>{data.total.ganados} / {data.total.perdidos}</td>
                                                <td>{porcentaje}%</td>
                                            </tr>
                                        );
                                    })
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <div className="stats-section">
                        <h3>Estadísticas de Parejas</h3>
                        <table className="stats-table">
                            <thead>
                                <tr>
                                    <th>Pareja</th>
                                    <th>Ganados</th>
                                    <th>Perdidos</th>
                                    <th>% Victorias</th>
                                    <th>Partidos Jugados</th>
                                </tr>
                            </thead>
                            <tbody>
                                {parejasOrdenadas.map(([pareja, data]) => {
                                    const total = data.ganados + data.perdidos;
                                    const porcentaje = total > 0 ? ((data.ganados / total) * 100).toFixed(1) : 0;
                                    
                                    return (
                                        <tr key={pareja}>
                                            <td><strong>{pareja}</strong></td>
                                            <td>{data.ganados}</td>
                                            <td>{data.perdidos}</td>
                                            <td>{porcentaje}%</td>
                                            <td>
                                                {data.fechas.map((f, idx) => (
                                                    <div key={idx} style={{fontSize: '12px', color: '#666'}}>
                                                        F{f.fecha} vs {f.rival}: {f.tipo} ({f.resultado ? '✓' : '✗'})
                                                    </div>
                                                ))}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
