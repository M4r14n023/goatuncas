        };

            const ref = database.ref(FIREBASE_PATH);
            ref.on('value', (snapshot) => {
                const datos = snapshot.val();
                if (datos) callback(datos);
            });
            return () => ref.off('value');
        };

        const PARTIDOS = [

        const JUGADORES_GOAT = {
            caballeros_2da: [ { nombre: "Maxi", categoria: "caballeros_2da" }, { nombre: "Hernan", categoria: "caballeros_2da" }, { nombre: "Walter", categoria: "caballeros_2da", capitan: true }, { nombre: "Charly", categoria: "caballeros_2da" } ],
            caballeros_3ra: [ { nombre: "Mariano", categoria: "caballeros_3ra" }, { nombre: "Tomy", categoria: "caballeros_3ra" }, { nombre: "Nico", categoria: "caballeros_3ra" }, { nombre: "Chicho", categoria: "caballeros_3ra" } ],

            damas_a: [ { nombre: "Caro Demaría", categoria: "damas_a" }, { nombre: "Kari", categoria: "damas_a" }, { nombre: "Grace", categoria: "damas_a" } ],
            damas_b: [ { nombre: "Mariela", categoria: "damas_b" }, { nombre: "Mariana", categoria: "damas_b" }, { nombre: "Caro Razquin", categoria: "damas_b" }, { nombre: "Beltra", categoria: "damas_b" } ],
            damas_c: [ { nombre: "Nelly", categoria: "damas_c" }, { nombre: "Marina", categoria: "damas_c" }, { nombre: "Lulu", categoria: "damas_c" }, { nombre: "Caro Sorbi", categoria: "damas_c" } ]
        };

        const EQUIPOS_POR_DEFECTO = [ 'Uncas', 'El Rojo', 'Ferro', 'Tercer Tiempo', 'Tres Arroyos', 'Head', 'La Cardoneta', 'La Sede', 'Tiro Federal' ];

        // COMPONENTE DE LOGIN (SELECCIÓN DE PERFIL)
        function LoginScreen({ onLogin }) {
            const [selectedRole, setSelectedRole] = useState(null);
            const [pin, setPin] = useState('');

            const handleEnter = () => {
                if (selectedRole === 'jugador') {
                    onLogin('jugador');
                } else if (selectedRole === 'capitan') {
                    if (pin === '1202') onLogin('capitan');
                    else alert('PIN de Capitán incorrecto');
                } else if (selectedRole === 'admin') {
                    if (pin === '2702') onLogin('admin');
                    else alert('PIN de Administrador incorrecto');
                }
            };

            return (
                <div className="container" style={{maxWidth: '100%', height: '100vh', display: 'flex', flexDirection: 'column', background: 'linear-gradient(135deg, #1a1a1a 0%, #2d2416 100%)', alignItems: 'center', justifyContent: 'center'}}>

                        <h1 style={{color: '#1e3c72', marginBottom: '10px'}}>Bienvenido a GOAT</h1>
                        <p style={{color: '#666', marginBottom: '30px'}}>Seleccioná tu perfil para ingresar</p>

                        {!selectedRole ? (

                            </div>
                        ) : (
                            <div>
                                <h3 style={{marginBottom: '20px'}}>Ingresá el PIN de {selectedRole === 'capitan' ? 'Capitán' : 'Admin'}</h3>
                                <input 
                                    type="password" 
                                    value={pin} 
                                    onChange={(e) => setPin(e.target.value)}
                                    onKeyPress={(e) => e.key === 'Enter' && handleEnter()}
                                    style={{textAlign: 'center', fontSize: '24px', letterSpacing: '8px', marginBottom: '20px'}}
                                    autoFocus
                                />
                                <div style={{display: 'flex', gap: '10px'}}>
                                    <button className="btn btn-primary" style={{flex: 1}} onClick={handleEnter}>Ingresar</button>
                                    <button className="btn btn-danger" style={{flex: 1}} onClick={() => { setSelectedRole(null); setPin(''); }}>Volver</button>

                        )}

            );

        function App() {
            const [userRole, setUserRole] = useState(localStorage.getItem('goat_user_role') || null);
            const [activeTab, setActiveTab] = useState('busqueda'); // Inicia en "Mis Partidos" por defecto
            
            const [numEquipos, setNumEquipos] = useState(10);
            const [equipos, setEquipos] = useState([]);
            const [baseEquipos, setBaseEquipos] = useState(EQUIPOS_POR_DEFECTO); 
            const [fechas, setFechas] = useState([]);
            const [posiciones, setPosiciones] = useState({});
            const [resultados, setResultados] = useState({});
            const [crucesFinales, setCrucesFinales] = useState([]);
            const [zonasConfig, setZonasConfig] = useState({ zona1: [], zona2: [] });
            const [playoffAvances, setPlayoffAvances] = useState({});
            const [syncStatus, setSyncStatus] = useState('local');
            const [lastSync, setLastSync] = useState(null);

            const isReceivingData = useRef(false);

            // Guardar rol en memoria
            useEffect(() => {
                if (userRole) localStorage.setItem('goat_user_role', userRole);
                else localStorage.removeItem('goat_user_role');
            }, [userRole]);

            useEffect(() => {
                const cargarDatos = async () => {
                    const datosGuardados = localStorage.getItem('goat_torneo_data');
                    if (datosGuardados) {
                        try {
                            const datos = JSON.parse(datosGuardados);
                            setNumEquipos(datos.numEquipos || 10); setEquipos(datos.equipos || []); setBaseEquipos(datos.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datos.fechas || []); setResultados(datos.resultados || {}); setPosiciones(datos.posiciones || {}); setCrucesFinales(datos.crucesFinales || []); setZonasConfig(datos.zonasConfig || { zona1: [], zona2: [] }); setPlayoffAvances(datos.playoffAvances || {});
                        } catch (e) { console.error('Error al cargar datos:', e); }
                    }

                    try {
                        setSyncStatus('syncing');
                        const datosFirebase = await cargarDesdeFirebase();
                        if (datosFirebase) {
                            isReceivingData.current = true;
                            setNumEquipos(datosFirebase.numEquipos || 10); setEquipos(datosFirebase.equipos || []); setBaseEquipos(datosFirebase.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datosFirebase.fechas || []); setResultados(datosFirebase.resultados || {}); setPosiciones(datosFirebase.posiciones || {}); setCrucesFinales(datosFirebase.crucesFinales || []); setZonasConfig(datosFirebase.zonasConfig || { zona1: [], zona2: [] }); setPlayoffAvances(datosFirebase.playoffAvances || {});
                            setLastSync(datosFirebase.ultimaActualizacion); setSyncStatus('synced');
                            localStorage.setItem('goat_torneo_data', JSON.stringify(datosFirebase));
                            setTimeout(() => { isReceivingData.current = false; }, 1000);
                        } else { setSyncStatus('local'); }
                    } catch (e) { setSyncStatus('local'); }
                };

                cargarDatos();

                const unsubscribe = escucharCambiosFirebase((datos) => {
                    if (datos && datos.ultimaActualizacion !== lastSync) {
                        isReceivingData.current = true;
                        setNumEquipos(datos.numEquipos || 10); setEquipos(datos.equipos || []); setBaseEquipos(datos.baseEquipos || EQUIPOS_POR_DEFECTO); setFechas(datos.fechas || []); setResultados(datos.resultados || {}); setPosiciones(datos.posiciones || {}); setCrucesFinales(datos.crucesFinales || []); setZonasConfig(datos.zonasConfig || { zona1: [], zona2: [] }); setPlayoffAvances(datos.playoffAvances || {});
                        setLastSync(datos.ultimaActualizacion); setSyncStatus('synced');
                        localStorage.setItem('goat_torneo_data', JSON.stringify(datos));
                        setTimeout(() => { isReceivingData.current = false; }, 1000);
                    }
                });

                return () => { if (unsubscribe) unsubscribe(); };
            }, []);

            useEffect(() => {
                if (isReceivingData.current) return;
                const datos = { numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances };
                localStorage.setItem('goat_torneo_data', JSON.stringify(datos));
                
                // Solo admin y capitán suben datos. Jugador no guarda en nube (protección extra)
                if (userRole !== 'jugador' && (equipos.length > 0 || fechas.length > 0)) {
                    setSyncStatus('syncing');
                    guardarEnFirebase(datos)
                        .then((tiempoExacto) => { setSyncStatus('synced'); setLastSync(tiempoExacto); })
                        .catch((error) => { console.error('Error al sincronizar:', error); setSyncStatus('error'); });
                }
            }, [numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances, userRole]);

            const logout = () => {
                setUserRole(null);
                setActiveTab('busqueda');
            };

            if (!userRole) {
                return <LoginScreen onLogin={setUserRole} />;
            }

            const guardarEquiposSeleccionados = (nombresRivales) => {
                const nuevosEquipos = nombresRivales.map(nombre => ({ nombre: nombre, esGoat: false }));
                const todosEquipos = [{ nombre: 'GOAT', esGoat: true }, ...nuevosEquipos];
                setEquipos(todosEquipos);
            };

            const agregarFecha = (numFecha, rival) => {
                const nuevaFecha = { numero: numFecha, rival: rival, partidos: PARTIDOS.map(p => ({ ...p, jugadores: [], horario: '', dia: 'sabado', ganado: false })), partidoBonus: null, categoriasHabilitadas: { caballeros_5ta_en_4ta: false, caballeros_4ta_en_3ra: false, caballeros_3ra_en_2da: false, damas_c_en_b: false, damas_b_en_a: false }, jugadoresHabilitados: [] };
                const nuevasFechas = [...fechas]; nuevasFechas[numFecha - 1] = nuevaFecha; setFechas(nuevasFechas);
            };

            const procesarHorarios = (fechaIndex, texto) => {
                const lineas = texto.split('\n').filter(l => l.trim());
                const fechaActual = {...fechas[fechaIndex]};
                lineas.forEach(linea => {
                    const match = linea.match(/(\d+)\s*[-.:]\s*(.+)/);
                    if (match) {
                        const numPartido = parseInt(match[1]); const info = match[2].trim();
                        const horarioMatch = info.match(/(\d{1,2}):(\d{2})/); const diaMatch = info.toLowerCase().includes('dom') ? 'domingo' : 'sabado';
                        const partidoIndex = fechaActual.partidos.findIndex(p => p.id === numPartido);
                        if (partidoIndex !== -1) { fechaActual.partidos[partidoIndex].horario = horarioMatch ? `${horarioMatch[1]}:${horarioMatch[2]}` : ''; fechaActual.partidos[partidoIndex].dia = diaMatch; }
                    }
                });
                const nuevasFechas = [...fechas]; nuevasFechas[fechaIndex] = fechaActual; setFechas(nuevasFechas);
            };

            const actualizarJugadores = (fechaIndex, partidoId, jugadores) => {
                const nuevasFechas = [...fechas]; const partidoIndex = nuevasFechas[fechaIndex].partidos.findIndex(p => p.id === partidoId);
                if (partidoIndex !== -1) nuevasFechas[fechaIndex].partidos[partidoIndex].jugadores = jugadores;
                setFechas(nuevasFechas);
            };

            const contarPartidosJugador = (fechaIndex, nombreJugador) => {
                let count = 0;
                if (fechas[fechaIndex] && fechas[fechaIndex].partidos) {
                    fechas[fechaIndex].partidos.forEach(partido => { if (partido.jugadores && partido.jugadores.some(j => j === nombreJugador)) count++; });
                }
                return count;
            };

            const toggleResultado = (fechaIndex, partidoId) => {
                if (userRole === 'jugador') return; // Bloqueo de seguridad
                const key = `${fechaIndex}-${partidoId}`; setResultados(prev => ({ ...prev, [key]: !prev[key] }));
            };

            const generarPDF = (fechaIndex) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const fecha = fechas[fechaIndex];
                if (!fecha) return;

                doc.setFontSize(20); doc.text(`GOAT - Fecha ${fecha.numero}`, 105, 20, { align: 'center' });
                doc.setFontSize(14); doc.text(`vs ${fecha.rival}`, 105, 30, { align: 'center' });
                
                let y = 45;
                const partidosPorHorario = {};
                
                if (fecha.partidos) {
                    fecha.partidos.filter(p => p.horario).forEach(partido => {
                        const key = `${partido.dia}-${partido.horario}`;
                        if (!partidosPorHorario[key]) partidosPorHorario[key] = { dia: partido.dia, hora: partido.horario, partidos: [] };
                        partidosPorHorario[key].partidos.push(partido);
                    });
                }
                
                const horariosPorDia = { sabado: [], domingo: [] };
                Object.values(partidosPorHorario).forEach(horario => horariosPorDia[horario.dia].push(horario));
                horariosPorDia.sabado.sort((a, b) => a.hora.localeCompare(b.hora));
                horariosPorDia.domingo.sort((a, b) => a.hora.localeCompare(b.hora));
                
                ['sabado', 'domingo'].forEach(dia => {
                    if (horariosPorDia[dia].length > 0) {
                        if (y > 250) { doc.addPage(); y = 20; }
                        doc.setFontSize(14); doc.setFont(undefined, 'bold'); doc.text(dia.toUpperCase(), 20, y); y += 8;
                        doc.setFont(undefined, 'normal'); doc.setFontSize(10);
                        
                        horariosPorDia[dia].forEach(horario => {
                            horario.partidos.sort((a, b) => (a.posicion || 0) - (b.posicion || 0));
                            horario.partidos.forEach(partido => {
                                const esBonus = fecha.partidoBonus === partido.id;
                                const jugadoresTexto = (partido.jugadores && partido.jugadores.length > 0) ? partido.jugadores.join(' / ') : 'Sin asignar';
                                const texto = `${horario.hora} - P${partido.posicion} - ${partido.tipo}${esBonus ? ' ★BONUS★' : ''}: ${jugadoresTexto}`;
                                if (y > 275) { doc.addPage(); y = 20; }
                                if (esBonus) doc.setFont(undefined, 'bold');
                                doc.text(texto, 20, y);
                                if (esBonus) doc.setFont(undefined, 'normal');
                                y += 6;
                            });
                            y += 2;
                        });
                        y += 5;
                    }
                });
                
                const partidosPorJugador = {};
                if (fecha.partidos) {
                    fecha.partidos.forEach(partido => {
                        if (partido.horario && partido.jugadores) {
                            partido.jugadores.forEach(jugador => { partidosPorJugador[jugador] = (partidosPorJugador[jugador] || 0) + 1; });
                        }
                    });
                }
                
                if (Object.keys(partidosPorJugador).length > 0) {
                    if (y + (Object.keys(partidosPorJugador).length * 5) + 20 > 280) { doc.addPage(); y = 20; } else { y += 10; }
                    doc.setFontSize(12); doc.setFont(undefined, 'bold'); doc.text('RESUMEN DE CONVOCATORIA', 20, y); y += 8;
                    doc.setFont(undefined, 'normal'); doc.setFontSize(9);
                    
                    Object.entries(partidosPorJugador).sort((a, b) => b[1] - a[1]).forEach(([jugador, cantidad]) => {
                        const jugadorObj = Object.values(JUGADORES_GOAT).flat().find(j => j.nombre === jugador);
                        const esCapitan = jugadorObj?.capitan ? ' (CAPITAN)' : '';
                        const advertencia = cantidad > 3 ? ' *** EXCEDE LIMITE ***' : '';
                        if (cantidad > 3) doc.setFont(undefined, 'bold');
                        doc.text(`${jugador}${esCapitan}: ${cantidad} partido${cantidad > 1 ? 's' : ''}${advertencia}`, 25, y);
                        if (cantidad > 3) doc.setFont(undefined, 'normal');
                        y += 5;
                    });
                }
                doc.save(`GOAT-Fecha${fecha.numero}-vs-${fecha.rival}.pdf`);
            };

            // Novedad: Motor de estadísticas ajustado para guardar historiales
            const calcularEstadisticas = () => {
                const stats = { jugadores: {}, parejas: {} };
                const todosJugadores = Object.values(JUGADORES_GOAT).flat();
                
                todosJugadores.forEach(jugador => {
                    stats.jugadores[jugador.nombre] = { 
                        categoria: jugador.categoria,
                        singles: { ganados: 0, perdidos: 0 }, 
                        dobles: { ganados: 0, perdidos: 0 }, 
                        total: { ganados: 0, perdidos: 0, historial: [] } 
                    };
                });
                
                fechas.forEach((fecha, fechaIdx) => {
                    if (!fecha || !fecha.partidos) return;
                    fecha.partidos.forEach(partido => {
                        if (partido.jugadores && partido.jugadores.length > 0) {
                            const key = `${fechaIdx}-${partido.id}`; 
                            const ganado = resultados[key] || false; 
                            const esSingle = partido.numJugadores === 1;
                            
                            partido.jugadores.forEach(jugador => {
                                if (stats.jugadores[jugador]) {
                                    const companeros = partido.jugadores.filter(j => j !== jugador);
                                    const compTexto = companeros.length > 0 ? companeros.join(' / ') : 'Jugó Single';

                                    if (esSingle) stats.jugadores[jugador].singles[ganado ? 'ganados' : 'perdidos']++;
                                    else stats.jugadores[jugador].dobles[ganado ? 'ganados' : 'perdidos']++;
                                    
                                    stats.jugadores[jugador].total[ganado ? 'ganados' : 'perdidos']++;
                                    
                                    // Guardamos el detalle para el módulo Individual
                                    stats.jugadores[jugador].total.historial.push({
                                        fechaNum: fecha.numero, rival: fecha.rival,
                                        tipo: partido.tipo, companero: compTexto, resultado: ganado
                                    });
                                }
                            });

                            if (!esSingle && partido.jugadores.length === 2) {
                                const parejaKey = [...partido.jugadores].sort().join(' - ');
                                if (!stats.parejas[parejaKey]) stats.parejas[parejaKey] = { ganados: 0, perdidos: 0, fechas: [], tiposJugados: [] };
                                stats.parejas[parejaKey][ganado ? 'ganados' : 'perdidos']++;
                                stats.parejas[parejaKey].fechas.push({ fecha: fecha.numero, rival: fecha.rival, tipo: partido.tipo, resultado: ganado });
                                if (!stats.parejas[parejaKey].tiposJugados.includes(partido.tipo)) {
                                    stats.parejas[parejaKey].tiposJugados.push(partido.tipo);
                                }
                            }
                        }
                    });
                });
                return stats;
            };

            return (
                <div className="container">
                    <div className="header">
                        <img src="GOAT.jpeg" alt="GOAT Logo" />
                        <div className="header-text">
                            <h1>GOAT - Interclubes UNCAS</h1>
                            <p>Sistema completo de seguimiento y armado de fechas</p>
                            
                            {userRole !== 'jugador' && (
                                <div style={{marginTop: '8px', display: 'flex', alignItems: 'center', gap: '8px', fontSize: '12px', color: '#c5a572'}}>
                                    {syncStatus === 'synced' && <><span style={{color: '#10b981'}}>●</span><span>Sincronizado con Nube</span></>}
                                    {syncStatus === 'syncing' && <><span style={{color: '#f59e0b'}}>●</span><span>Sincronizando...</span></>}
                                    {syncStatus === 'local' && <><span style={{color: '#6b7280'}}>●</span><span>Solo local</span></>}
                                    {syncStatus === 'error' && <><span style={{color: '#ef4444'}}>●</span><span>Error de sincronización</span></>}
                                </div>
                            )}
                        </div>
                        
                        <div className="user-menu">
                            <span style={{color: '#c5a572', fontSize: '14px', fontWeight: 'bold'}}>
                                {userRole === 'admin' ? '⚙️ Admin' : userRole === 'capitan' ? '⭐ Capitán' : '👤 Jugador'}
                            </span>
                            <button className="btn btn-danger" style={{padding: '5px 10px', fontSize: '12px', margin: 0}} onClick={logout}>Salir</button>
                        </div>
                    </div>

                    <div className="tabs">
                        <button className={`tab ${activeTab === 'busqueda' ? 'active' : ''}`} onClick={() => setActiveTab('busqueda')}>Mis Partidos 🔍</button>
                        <button className={`tab ${activeTab === 'resultados' ? 'active' : ''}`} onClick={() => setActiveTab('resultados')}>Resultados</button>
                        <button className={`tab ${activeTab === 'tablas' ? 'active' : ''}`} onClick={() => setActiveTab('tablas')}>Tablas</button>
                        <button className={`tab ${activeTab === 'estadisticas' ? 'active' : ''}`} onClick={() => setActiveTab('estadisticas')}>Estadísticas</button>
                        <button className={`tab ${activeTab === 'fechas' ? 'active' : ''}`} onClick={() => setActiveTab('fechas')}>Fechas</button>
                        <button className={`tab ${activeTab === 'configuracion' ? 'active' : ''}`} onClick={() => setActiveTab('configuracion')}>Configuración</button>
                        
                        {userRole === 'admin' && (
                            <button className={`tab admin-tab ${activeTab === 'admin' ? 'active' : ''}`} onClick={() => setActiveTab('admin')}>⚙️ Admin</button>
                        )}
                    </div>

                    <div className="content">
                        {activeTab === 'busqueda' && <BusquedaTab fechas={fechas} />}
                        {activeTab === 'estadisticas' && <EstadisticasTab calcularEstadisticas={calcularEstadisticas} />}
                        
                        {activeTab === 'configuracion' && (
                            <ConfiguracionTab 
                                userRole={userRole} numEquipos={numEquipos} setNumEquipos={setNumEquipos} equipos={equipos} baseEquipos={baseEquipos} setBaseEquipos={setBaseEquipos}
                                guardarEquiposSeleccionados={guardarEquiposSeleccionados} agregarFecha={agregarFecha} fechas={fechas} zonasConfig={zonasConfig} setZonasConfig={setZonasConfig}
                            />
                        )}
                        {activeTab === 'fechas' && (
                            <FechasTab 
                                userRole={userRole} fechas={fechas} procesarHorarios={procesarHorarios} actualizarJugadores={actualizarJugadores} 
                                contarPartidosJugador={contarPartidosJugador} generarPDF={generarPDF} setFechas={setFechas} 
                            />
                        )}
                        {activeTab === 'resultados' && (
                            <ResultadosTab 
                                userRole={userRole} fechas={fechas} resultados={resultados} toggleResultado={toggleResultado} zonasConfig={zonasConfig} 
                                crucesFinales={crucesFinales} playoffAvances={playoffAvances} setPlayoffAvances={setPlayoffAvances} 
                            />
                        )}
                        {activeTab === 'tablas' && (
                            <TablasTab 
                                userRole={userRole} equipos={equipos} fechas={fechas} resultados={resultados} crucesFinales={crucesFinales} 
                                setCrucesFinales={setCrucesFinales} zonasConfig={zonasConfig} setZonasConfig={setZonasConfig} 
                            />
                        )}
                        {activeTab === 'admin' && userRole === 'admin' && (
                            <AdminTab 
                                numEquipos={numEquipos} equipos={equipos} baseEquipos={baseEquipos} fechas={fechas} resultados={resultados} posiciones={posiciones} crucesFinales={crucesFinales} zonasConfig={zonasConfig} playoffAvances={playoffAvances}
                                setNumEquipos={setNumEquipos} setEquipos={setEquipos} setBaseEquipos={setBaseEquipos} setFechas={setFechas} setResultados={setResultados} setPosiciones={setPosiciones} setCrucesFinales={setCrucesFinales} setZonasConfig={setZonasConfig} setPlayoffAvances={setPlayoffAvances}
                                syncStatus={syncStatus} setSyncStatus={setSyncStatus} lastSync={lastSync} setLastSync={setLastSync} guardarEnFirebase={guardarEnFirebase} cargarDesdeFirebase={cargarDesdeFirebase}
                            />
                        )}
                    </div>
                </div>
            );
        }

        // COMPONENTES

        function BusquedaTab({ fechas }) {
            const [jugadorSeleccionado, setJugadorSeleccionado] = useState('');
            const [fechaSeleccionada, setFechaSeleccionada] = useState('todas');
            const jugadores = Object.values(JUGADORES_GOAT).flat().map(j => j.nombre).sort((a, b) => a.localeCompare(b));

            return (
                <div>
                    <h2 style={{marginBottom: '20px', color: '#1e3c72'}}>🔍 Mis Partidos</h2>
                    <div className="grid-2" style={{marginBottom: '30px', background: '#f8f9fa', padding: '20px', borderRadius: '8px', border: '1px solid #e2e8f0'}}>
                        <div className="form-group" style={{marginBottom: 0}}>
                            <label>Seleccionar Jugador</label>
                            <select value={jugadorSeleccionado} onChange={(e) => setJugadorSeleccionado(e.target.value)}>
                                <option value="">-- Elegir jugador --</option>
                                {jugadores.map((j, idx) => <option key={idx} value={j}>{j}</option>)}
                            </select>
                        </div>
                        <div className="form-group" style={{marginBottom: 0}}>
                            <label>Filtrar por Fecha</label>
                            <select value={fechaSeleccionada} onChange={(e) => setFechaSeleccionada(e.target.value)}>
                                <option value="todas">Todas las fechas</option>
                                {fechas.map((f, idx) => <option key={idx} value={idx}>Fecha {f.numero} vs {f.rival}</option>)}
                            </select>
                        </div>
                    </div>

                    {jugadorSeleccionado ? (
                        <div>
                            <h3 style={{marginBottom: '20px', color: '#1e3c72'}}>Partidos asignados para {jugadorSeleccionado}</h3>
                            {fechas.filter((_, idx) => fechaSeleccionada === 'todas' || parseInt(fechaSeleccionada) === idx).map((fecha, fechaIdx) => {
                                if (!fecha || !fecha.partidos) return null;
                                const partidosDelJugador = fecha.partidos.filter(p => p.jugadores && p.jugadores.includes(jugadorSeleccionado) && p.horario);
                                if (partidosDelJugador.length === 0) return null;

                                return (
                                    <div key={fechaIdx} className="date-section">
                                        <div className="date-header">Fecha {fecha.numero} - vs {fecha.rival}</div>
                                        <div className="match-grid" style={{marginTop: '10px'}}>
                                            {partidosDelJugador.sort((a, b) => {
                                                if (a.dia !== b.dia) return a.dia === 'sabado' ? -1 : 1;
                                                return a.horario.localeCompare(b.horario);
                                            }).map(partido => {
                                                const companeros = partido.jugadores.filter(j => j !== jugadorSeleccionado);
                                                const esBonus = fecha.partidoBonus === partido.id;
                                                return (
                                                    <div key={partido.id} className={`match-card ${esBonus ? 'bonus' : ''}`}>
                                                        <div className="flex-mobile-col" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px', gap: '10px'}}>
                                                            <div className="match-type" style={{color: '#1e3c72', fontSize: '16px', fontWeight: '700'}}>
                                                                {partido.tipo} {esBonus && <span style={{color: '#f59e0b', fontSize: '14px', marginLeft: '5px'}}>⭐ (Bonus)</span>}
                                                            </div>
                                                            <div className="match-time" style={{background: '#10b981', padding: '6px 14px'}}>
                                                                {partido.dia === 'sabado' ? 'Sábado' : 'Domingo'} {partido.horario} - P{partido.posicion}
                                                            </div>
                                                        </div>
                                                        <div style={{background: 'white', padding: '10px', borderRadius: '6px', border: '1px solid #e2e8f0'}}>
                                                            <strong style={{color: '#64748b'}}>Compañero/a: </strong> 
                                                            <span style={{fontWeight: '600', color: '#0f172a'}}>{companeros.length > 0 ? companeros.join(' / ') : 'Juega Single'}</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                            
                            {fechas.filter((_, idx) => fechaSeleccionada === 'todas' || parseInt(fechaSeleccionada) === idx).every(fecha => 
                                !fecha.partidos || fecha.partidos.filter(p => p.jugadores && p.jugadores.includes(jugadorSeleccionado) && p.horario).length === 0
                            ) && (<div className="warning" style={{textAlign: 'center', padding: '20px'}}>{jugadorSeleccionado} no está convocado para {fechaSeleccionada === 'todas' ? 'ninguna fecha' : 'esta fecha'}.</div>)}
                        </div>
                    ) : (
                        <div style={{textAlign: 'center', padding: '40px', background: '#f8f9fa', borderRadius: '8px', color: '#64748b', border: '2px dashed #cbd5e1'}}>
                            <div style={{fontSize: '40px', marginBottom: '10px'}}>🎾</div>
                            <p style={{fontSize: '18px', fontWeight: '600', color: '#475569'}}>Seleccioná tu nombre arriba</p>
                            <p style={{fontSize: '14px'}}>Para ver los días y horarios de tus partidos asignados.</p>
                        </div>
                    )}
                </div>
            );
        }

        function AdminTab({ 
            numEquipos, equipos, baseEquipos, fechas, resultados, posiciones, crucesFinales, zonasConfig, playoffAvances,
            setNumEquipos, setEquipos, setBaseEquipos, setFechas, setResultados, setPosiciones, setCrucesFinales, setZonasConfig, setPlayoffAvances,
            syncStatus, setSyncStatus, lastSync, setLastSync, guardarEnFirebase, cargarDesdeFirebase
        }) {
            const exportarDatos = () => {
                const datos = localStorage.getItem('goat_torneo_data');
                if (!datos) { alert('No hay datos guardados para exportar.'); return; }
                const blob = new Blob([datos], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `goat_backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            const importarDatos = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evento) => {
                    try {
                        const contenido = JSON.parse(evento.target.result);
                        if (contenido && (contenido.equipos || contenido.baseEquipos)) {
                            if (confirm('¿Estás seguro de sobreescribir los datos actuales con este respaldo?')) {
                                localStorage.setItem('goat_torneo_data', JSON.stringify(contenido));
                                alert('Datos importados correctamente. La página se recargará.');
                                window.location.reload();
                            }
                        } else { alert('El archivo no parece ser un respaldo válido de la app.'); }
                    } catch (error) { alert('Error al leer el archivo. Asegurate de que sea un archivo JSON válido.'); }
                };
                reader.readAsText(file); e.target.value = ''; 
            };

            return (
                <div>
                    <h2 style={{color: '#1e3c72', marginBottom: '20px'}}>⚙️ Panel de Control Administrador</h2>
                    
                    <div style={{background: '#f8f9fa', padding: '20px', borderRadius: '8px', marginBottom: '30px', border: '1px solid #e2e8f0'}}>
                        <h3 style={{marginBottom: '10px', color: '#0f172a'}}>💾 Respaldo y Nube</h3>

                    setBaseEquipos([...baseEquipos, nombreLimpio].sort()); setNuevoClub('');

                }

            const obtenerOpcionesDisponibles = (index) => { return baseEquipos.filter(club => { return !rivalesTemp.some((r, i) => r === club && i !== index); }); };

                    for (let i = 0; i < zona1.length; i++) {
                        for (let j = i + 1; j < zona1.length; j++) {

                    const zona2 = zonasConfig.zona2.filter(e => e);

                        for (let j = i + 1; j < zona2.length; j++) {

                    setCrucesConFechas(cruces);
                };

            const actualizarFecha = (idx, fecha) => { const nuevos = [...crucesConFechas]; nuevos[idx].fecha = fecha; setCrucesConFechas(nuevos); };

                if (crucesConFechas.some(c => !c.fecha)) { alert('Por favor asigná una fecha a todos los cruces'); return; }

        function TablasTab({ userRole, equipos, fechas, resultados, crucesFinales, setCrucesFinales, zonasConfig, setZonasConfig }) {
            const [showCruceModal, setShowCruceModal] = useState(false);
            const [cruceActual, setCruceActual] = useState({ tipo: '', equipo1: '', equipo2: '', resultado1: '', resultado2: '' });
            const [editandoCruce, setEditandoCruce] = useState(null);

            if (equipos.length < 10) return <div className="warning">Por favor, que un Capitán configure primero los equipos en la pestaña "Configuración".</div>;

            const calcularTablaZona = (zona) => {
                const equiposZona = zona === 1 ? zonasConfig.zona1 : zonasConfig.zona2;
                const tabla = {};
                equiposZona.forEach(equipo => { if (equipo) tabla[equipo] = { partidos: 0, ganados: 0, perdidos: 0, puntosFavor: 0, puntosContra: 0, diferencia: 0, puntosTotales: 0 }; });

                fechas.forEach((fecha, fechaIdx) => {
                    if (!fecha || !fecha.partidos) return;
                    const rival = fecha.rival;
                    if (tabla['GOAT'] && tabla[rival]) {
                        let puntosGOAT = 0; let puntosRival = 0;
                        fecha.partidos.forEach(partido => {
                            if (partido.jugadores && partido.jugadores.length > 0) {
                                const key = `${fechaIdx}-${partido.id}`; const ganado = resultados[key] || false; const esBonus = fecha.partidoBonus === partido.id; const puntos = esBonus ? 20 : 10;
                                if (ganado) puntosGOAT += puntos; else puntosRival += puntos;
                            }
                        });
                        if (tabla['GOAT']) { tabla['GOAT'].partidos++; tabla['GOAT'].puntosFavor += puntosGOAT; tabla['GOAT'].puntosContra += puntosRival; tabla['GOAT'].puntosTotales += puntosGOAT; if (puntosGOAT > puntosRival) tabla['GOAT'].ganados++; else if (puntosGOAT < puntosRival) tabla['GOAT'].perdidos++; tabla['GOAT'].diferencia = tabla['GOAT'].puntosFavor - tabla['GOAT'].puntosContra; }
                        if (tabla[rival]) { tabla[rival].partidos++; tabla[rival].puntosFavor += puntosRival; tabla[rival].puntosContra += puntosGOAT; tabla[rival].puntosTotales += puntosRival; if (puntosRival > puntosGOAT) tabla[rival].ganados++; else if (puntosRival < puntosGOAT) tabla[rival].perdidos++; tabla[rival].diferencia = tabla[rival].puntosFavor - tabla[rival].puntosContra; }
                    }
                });

                crucesFinales.forEach(cruce => {
                    if (tabla[cruce.equipo1] && tabla[cruce.equipo2]) {
                        const pts1 = parseInt(cruce.resultado1) || 0; const pts2 = parseInt(cruce.resultado2) || 0;
                        if (pts1 > 0 || pts2 > 0) {
                            tabla[cruce.equipo1].partidos++; tabla[cruce.equipo1].puntosFavor += pts1; tabla[cruce.equipo1].puntosContra += pts2; tabla[cruce.equipo1].puntosTotales += pts1;

        // COMPONENTE PARA DIBUJAR BARRAS DE EFECTIVIDAD
        const EfectividadBar = ({ ganados, perdidos, label }) => {

            const getCategoriaNombre = (nombreJugador) => {
                const jugador = Object.values(JUGADORES_GOAT).flat().find(j => j.nombre === nombreJugador);

            };

            const jugadoresPorCategoria = {};
            Object.entries(stats.jugadores).sort((a, b) => {
                const ordenA = getCategoriaOrden(a[0]); const ordenB = getCategoriaOrden(b[0]);

            }).forEach(([nombre, data]) => {

                                                        <div style={{fontSize: '13px', color: '#475569', marginTop: '4px'}}>Compañero: {h.companero}</div>
                                                    </div>
                                                    <span style={{background: h.resultado ? '#d1fae5' : '#fee2e2', color: h.resultado ? '#065f46' : '#991b1b', padding: '4px 8px', borderRadius: '4px', fontSize: '12px', fontWeight: 'bold'}}>
                                                        {h.resultado ? 'Ganó' : 'Perdió'}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* VISTA PAREJAS */}
                    {subTab === 'parejas' && (
                        <div>
                            <div className="grid-2" style={{background: '#f8f9fa', padding: '20px', borderRadius: '8px', border: '1px solid #e2e8f0', marginBottom: '20px'}}>
                                <div className="form-group" style={{marginBottom: 0}}>
                                    <label>Rama</label>
                                    <select value={parRama} onChange={e => {setParRama(e.target.value); setParTipo(''); setParElegida('');}}>
                                        <option value="">-- Seleccionar --</option>
                                        <option value="Damas">Damas</option>
                                        <option value="Caballeros">Caballeros</option>
                                        <option value="Mixtos">Mixtos</option>
                                    </select>
                                </div>
                                <div className="form-group" style={{marginBottom: 0}}>
                                    <label>Tipo de Partido</label>
                                    <select value={parTipo} onChange={e => {setParTipo(e.target.value); setParElegida('');}} disabled={!parRama}>
                                        <option value="">Todos los de la rama</option>
                                        {tiposOptions.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <div className="form-group" style={{marginBottom: 0, gridColumn: '1 / -1'}}>
                                    <label>Elegir Pareja Analizada</label>
                                    <select value={parElegida} onChange={e => setParElegida(e.target.value)} disabled={!parRama}>
                                        <option value="">-- Buscar pareja --</option>
                                        {parejasDisponibles.map(([p]) => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                </div>
                            </div>

                            {parElegida && stats.parejas[parElegida] && (
                                <div className="grid-2">
                                    <div style={{background: 'white', padding: '20px', borderRadius: '8px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px rgba(0,0,0,0.05)'}}>
                                        <h3 style={{marginBottom: '5px', color: '#1e3c72'}}>{parElegida}</h3>
                                        <p style={{color: '#64748b', fontSize: '13px', marginBottom: '15px'}}>Categorías jugadas: {stats.parejas[parElegida].tiposJugados.join(', ')}</p>
                                        <EfectividadBar ganados={stats.parejas[parElegida].ganados} perdidos={stats.parejas[parElegida].perdidos} label="Efectividad de la Pareja" />
                                    </div>
                                    <div style={{background: 'white', padding: '20px', borderRadius: '8px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px rgba(0,0,0,0.05)'}}>
                                        <h3 style={{marginBottom: '15px', color: '#1e3c72'}}>Desempeño Juntos</h3>
                                        <div style={{maxHeight: '250px', overflowY: 'auto'}}>
                                            {stats.parejas[parElegida].fechas.map((h, i) => (
                                                <div key={i} style={{padding: '10px', borderBottom: '1px solid #eee', display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                                    <div>
                                                        <strong style={{color: '#334155'}}>{h.tipo}</strong> 
                                                        <div style={{fontSize: '13px', color: '#64748b', marginTop: '4px'}}>F{h.fecha} vs {h.rival}</div>
                                                    </div>
                                                    <span style={{background: h.resultado ? '#d1fae5' : '#fee2e2', color: h.resultado ? '#065f46' : '#991b1b', padding: '4px 8px', borderRadius: '4px', fontSize: '12px', fontWeight: 'bold'}}>
                                                        {h.resultado ? 'Ganó' : 'Perdió'}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* VISTA RANKING (EFECTIVIDAD) */}
                    {subTab === 'ranking' && (
                        <div className="grid-2">
                            {/* Ranking Parejas */}
                            <div style={{background: 'white', padding: '20px', borderRadius: '8px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px rgba(0,0,0,0.05)'}}>
                                <h3 style={{marginBottom: '15px', color: '#1e3c72', display: 'flex', alignItems: 'center', gap: '10px'}}>🥇 Top Parejas</h3>
                                {topParejas.length === 0 ? <p style={{color: '#94a3b8'}}>Aún no hay datos.</p> : 
                                 topParejas.map(([nombre, data], idx) => {
                                    const total = data.ganados + data.perdidos;
                                    const pct = total > 0 ? ((data.ganados / total) * 100).toFixed(0) : 0;
                                    const isExpanded = expandedDetail === `par-${idx}`;
                                    return (
                                        <div key={idx} style={{marginBottom: '10px', border: '1px solid #e2e8f0', borderRadius: '8px', overflow: 'hidden'}}>
                                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', background: idx < 3 ? '#fffbef' : '#f8f9fa', cursor: 'pointer'}} onClick={() => setExpandedDetail(isExpanded ? null : `par-${idx}`)}>
                                                <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                                                    <span style={{fontSize: '18px', fontWeight: 'bold', color: idx === 0 ? '#d4af37' : idx === 1 ? '#94a3b8' : idx === 2 ? '#b45309' : '#475569'}}>#{idx + 1}</span>
                                                    <div>
                                                        <strong style={{color: '#0f172a', display: 'block'}}>{nombre}</strong>
                                                        <span style={{fontSize: '12px', color: '#64748b'}}>{data.ganados} Ganados, {data.perdidos} Perdidos</span>
                                                    </div>
                                                </div>
                                                <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                                                    <span style={{background: '#10b981', color: 'white', padding: '4px 8px', borderRadius: '12px', fontSize: '12px', fontWeight: 'bold'}}>{pct}%</span>
                                                    <span style={{color: '#cbd5e1', fontSize: '12px'}}>{isExpanded ? '▼' : '▶'}</span>
                                                </div>
                                            </div>
                                            {isExpanded && (
                                                <div style={{padding: '10px 12px', background: 'white', borderTop: '1px solid #e2e8f0'}}>
                                                    {data.fechas.map((f, i) => (
                                                        <div key={i} style={{fontSize: '12px', padding: '4px 0', borderBottom: i !== data.fechas.length - 1 ? '1px dashed #eee' : 'none', display: 'flex', justifyContent: 'space-between'}}>
                                                            <span>F{f.fecha} vs {f.rival} ({f.tipo})</span>
                                                            <span style={{color: f.resultado ? '#10b981' : '#ef4444', fontWeight: 'bold'}}>{f.resultado ? 'W' : 'L'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                 })
                                }
                            </div>

                            {/* Ranking Singles */}
                            <div style={{background: 'white', padding: '20px', borderRadius: '8px', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px rgba(0,0,0,0.05)'}}>
                                <h3 style={{marginBottom: '15px', color: '#1e3c72', display: 'flex', alignItems: 'center', gap: '10px'}}>🎾 Top Singlistas</h3>
                                {topSinglistas.length === 0 ? <p style={{color: '#94a3b8'}}>Aún no se han jugado singles.</p> : 
                                 topSinglistas.map(([nombre, data], idx) => {
                                    const total = data.singles.ganados + data.singles.perdidos;
                                    const pct = total > 0 ? ((data.singles.ganados / total) * 100).toFixed(0) : 0;
                                    const isExpanded = expandedDetail === `sin-${idx}`;
                                    return (
                                        <div key={idx} style={{marginBottom: '10px', border: '1px solid #e2e8f0', borderRadius: '8px', overflow: 'hidden'}}>
                                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px', background: idx < 3 ? '#fffbef' : '#f8f9fa', cursor: 'pointer'}} onClick={() => setExpandedDetail(isExpanded ? null : `sin-${idx}`)}>
                                                <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                                                    <span style={{fontSize: '18px', fontWeight: 'bold', color: idx === 0 ? '#d4af37' : idx === 1 ? '#94a3b8' : idx === 2 ? '#b45309' : '#475569'}}>#{idx + 1}</span>
                                                    <div>
                                                        <strong style={{color: '#0f172a', display: 'block'}}>{nombre}</strong>
                                                        <span style={{fontSize: '12px', color: '#64748b'}}>{data.singles.ganados} Ganados, {data.singles.perdidos} Perdidos</span>
                                                    </div>
                                                </div>
                                                <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                                                    <span style={{background: '#10b981', color: 'white', padding: '4px 8px', borderRadius: '12px', fontSize: '12px', fontWeight: 'bold'}}>{pct}%</span>
                                                    <span style={{color: '#cbd5e1', fontSize: '12px'}}>{isExpanded ? '▼' : '▶'}</span>
                                                </div>
                                            </div>
                                            {isExpanded && (
                                                <div style={{padding: '10px 12px', background: 'white', borderTop: '1px solid #e2e8f0'}}>
                                                    {data.singles.historial.map((f, i) => (
                                                        <div key={i} style={{fontSize: '12px', padding: '4px 0', borderBottom: i !== data.singles.historial.length - 1 ? '1px dashed #eee' : 'none', display: 'flex', justifyContent: 'space-between'}}>
                                                            <span>F{f.fecha} vs {f.rival} ({f.tipo})</span>
                                                            <span style={{color: f.resultado ? '#10b981' : '#ef4444', fontWeight: 'bold'}}>{f.resultado ? 'W' : 'L'}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    );
                                 })
                                }
                            </div>
                        </div>
                    )}

                    {/* VISTA TABLA CLÁSICA */}
                    {subTab === 'general' && (
                        <>
                            <div className="stats-section">
                                <h3>Estadísticas Individuales</h3>
                                <div className="table-container">
                                    <table className="stats-table">
                                        <thead><tr><th>Categoría</th><th>Jugador</th><th>Singles G/P</th><th>Dobles G/P</th><th>Total G/P</th><th>% Victorias</th></tr></thead>
                                        <tbody>
                                            {Object.entries(jugadoresPorCategoria).map(([categoria, jugadores]) => (
                                                jugadores.map(([nombre, data], idx) => {
                                                    const total = data.total.ganados + data.total.perdidos; const porcentaje = total > 0 ? ((data.total.ganados / total) * 100).toFixed(1) : 0;
                                                    return (
                                                        <tr key={nombre}>
                                                            {idx === 0 && (<td rowSpan={jugadores.length} style={{ fontWeight: '700', background: '#f0f9ff', verticalAlign: 'middle' }}>{categoria}</td>)}
                                                            <td><strong>{nombre}</strong></td><td>{data.singles.ganados} / {data.singles.perdidos}</td>
                                                            <td>{data.dobles.ganados} / {data.dobles.perdidos}</td><td>{data.total.ganados} / {data.total.perdidos}</td><td>{porcentaje}%</td>
                                                        </tr>
                                                    );
                                                })
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div className="stats-section">
                                <h3>Estadísticas de Parejas</h3>
                                <div className="table-container">
                                    <table className="stats-table">
                                        <thead><tr><th>Pareja</th><th>Ganados</th><th>Perdidos</th><th>% Victorias</th><th>Partidos Jugados</th></tr></thead>
                                        <tbody>
                                            {Object.entries(stats.parejas).sort((a,b)=>b[1].ganados - a[1].ganados).map(([pareja, data]) => {
                                                const total = data.ganados + data.perdidos; const porcentaje = total > 0 ? ((data.ganados / total) * 100).toFixed(1) : 0;
                                                return (
                                                    <tr key={pareja}>
                                                        <td><strong>{pareja}</strong></td><td>{data.ganados}</td><td>{data.perdidos}</td><td>{porcentaje}%</td>
                                                        <td>{data.fechas.map((f, idx) => (<div key={idx} style={{fontSize: '12px', color: '#666'}}>F{f.fecha} vs {f.rival}: {f.tipo} ({f.resultado ? '✓' : '✗'})</div>))}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
